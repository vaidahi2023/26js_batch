<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello</h1>
    <div>
        <h1>hi</h1>
    </div>
    <h1>jay</h1>

    <button onclick="changetext()">changetext</button>
</body>
<script>
    function changetext()
    {
        var h1=document.getElementsByTagName("h1")
        for(var i=0;i<h1.length;i++)
        {
            h1[i].innerHTML=i
            h1[i].innerHTML=i
            h1[i].innerHTML=i
            
        
        }
    }
</script>
</html>
