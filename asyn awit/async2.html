<script>
    const payment = () => {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve({
                    message: "payment done",
                    data: {
                        id: 1,
                        amount: 2000
                    }
                })
            }, 2000)
        })
    }

    const receipt=async ()=>
    {
        console.log("starting payment")
        const receiptdata=await payment();
        console.log("payment end")

        console.log("receipt start")
        return new Promise((resolve,reject)=>
    {
        setTimeout(()=>
    {
        resolve(receiptdata)
    },3000)
    })
    }

    const printreceipt=async()=>
    {
        const rec=await receipt();
        console.log(rec)
        console.log("receipt end")
    }
    printreceipt()
</script>
